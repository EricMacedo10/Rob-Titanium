name: "🎬 TITANIUM: Reels & Stories Auto-Post"

on:
  schedule:
    # 12:30 BRT (Horário nobre de almoço - pico de engajamento)
    - cron: '30 15 * * *'
  workflow_dispatch:

concurrency:
  group: titanium-reels
  cancel-in-progress: true
  
permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  PYTHONUNBUFFERED: 1

jobs:
  reels-post-cycle:
    runs-on: ubuntu-latest
    steps:
      - name: "🛰️ Checkout Code"
        uses: actions/checkout@v4

      - name: "🐍 Setup Python Stack"
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: "🎥 Install FFmpeg & Fonts (Required for Video Generation)"
        run: sudo apt-get update && sudo apt-get install -y ffmpeg fonts-dejavu-core

      - name: "📦 Install Core Dependencies"
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt --retries 5 --timeout 60
          pip install pandas moviepy Pillow requests

      - name: "🎬 Disparar Máquina de Reels/Stories (Moda & Beleza)"
        env:
          PYTHONPATH: .
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
          IG_BUSINESS_ID: ${{ secrets.IG_BUSINESS_ID }}
          PAGE_ID: ${{ secrets.PAGE_ID }}
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USER: ${{ secrets.FTP_USER }}
          FTP_PASS: ${{ secrets.FTP_PASS }}
          SHOPEE_DATAFEED_URLS: ${{ secrets.SHOPEE_DATAFEED_URLS }}
          ENV_MODE: PRODUCTION
        run: python social/automate_reels.py

      - name: 📦 Arquivar Estado do Bot (Evitar Repetições)
        uses: stefanzweifel/git-auto-commit-action@v4
        with:
          commit_message: "🎬 Reels Bot: Estado Atualizado (ofertas.json / postados)"
          file_pattern: 'social/postados/ social/ofertas.json'
