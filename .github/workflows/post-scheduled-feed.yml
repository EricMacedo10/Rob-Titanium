name: 📸 Postagem Agendada no Feed

on:
  schedule:
    # Trigger Primário: 10:12 BRT (13:12 UTC)
    - cron: '12 13 * 2,3 *'
    
    # Trigger de Segurança: 10:42 BRT (13:42 UTC)
    - cron: '42 13 * 2,3 *'
  
  # Permite execução manual via GitHub UI
  workflow_dispatch:

jobs:
  post-scheduled-feed:
    name: 📅 Postar Imagem do Dia
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: 📥 Checkout do Código
        uses: actions/checkout@v4
      
      - name: 🐍 Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: 📦 Instalar Dependências
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: 🔧 Configurar Variáveis de Ambiente
        run: |
          echo "ENV_MODE=PRODUCTION" >> .env
          echo "IG_ACCESS_TOKEN=${{ secrets.IG_ACCESS_TOKEN }}" >> .env
          echo "IG_BUSINESS_ID=${{ secrets.IG_BUSINESS_ID }}" >> .env
          echo "FTP_HOST=${{ secrets.FTP_HOST }}" >> .env
          echo "FTP_USER=${{ secrets.FTP_USER }}" >> .env
          echo "FTP_PASS=${{ secrets.FTP_PASS }}" >> .env
          echo "IMGBB_API_KEY=${{ secrets.IMGBB_API_KEY }}" >> .env
      
      - name: 📸 Executar Postagem Agendada
        run: |
          echo "🚀 Verificando postagem do dia..."
          python -m social.automation.post_scheduled_feed
        env:
          TZ: America/Sao_Paulo
      
      - name: 📝 Log de Execução
        if: always()
        run: |
          echo "================================================"
          echo "📅 Data/Hora: $(TZ=America/Sao_Paulo date '+%Y-%m-%d %H:%M:%S BRT')"
          echo "🤖 Workflow: ${{ github.workflow }}"
          echo "🔄 Run ID: ${{ github.run_id }}"
          echo "================================================"
      
      - name: 📤 Commit Arquivamento
        if: success()
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "Robô Titanium"
          git add social/postados/ social/fila/
          git diff --cached --quiet || (git commit -m "📸 Post agendado arquivado - $(TZ=America/Sao_Paulo date '+%Y-%m-%d')" && git pull --rebase origin main && git push origin main)
