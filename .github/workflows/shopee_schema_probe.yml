name: "🔍 TITANIUM: Shopee Schema Probe (Dev Tool)"

on:
  workflow_dispatch:

jobs:
  schema-probe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - run: pip install requests python-dotenv --quiet
      - name: "🔍 Rodar Schema Probe"
        env:
          PYTHONPATH: .
          SHOPEE_APP_ID: ${{ secrets.SHOPEE_APP_ID }}
          SHOPEE_SECRET: ${{ secrets.SHOPEE_SECRET }}
        run: python infra/shopee_schema_probe.py
