name: "✍️ TITANIUM: Editorial Semanal (7 dias)"

on:
  schedule:
    # Executa todo domingo às 03:00 BRT (06:00 UTC)
    - cron: '0 6 * * 0'
  workflow_dispatch:

concurrency:
  group: titanium-blog
  cancel-in-progress: true

jobs:
  generate-article:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 🛰️ Checkout Código
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 📦 Instalar Dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt --retries 5 --timeout 60

      - name: ✍️ Gerar Novo Artigo Semanal
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          SHOPEE_DATAFEED_URLS: ${{ secrets.SHOPEE_DATAFEED_URLS }}
          PYTHONPATH: .
        run: python -m core.auto_blog_generator

      - name: 🛡️ Nuclear Shield Gate (Audit Links)
        run: python infra/shield.py
        env:
          PYTHONPATH: .

      - name: 📦 Auto-Commit Blog Update
        uses: stefanzweifel/git-auto-commit-action@v4
        with:
          commit_message: "🤖 [Bot] Titanium: Atualização do Editorial/Blog"
          file_pattern: 'site/blog/ site/index.html'

      - name: 🚀 Subir para Produção (Hostinger)
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USER: ${{ secrets.FTP_USER }}
          FTP_PASS: ${{ secrets.FTP_PASS }}
          ENV_MODE: PRODUCTION
          PYTHONPATH: .
        run: python sync_production_v12.py

      - name: ✨ Blog Atualizado
        run: echo "Novo artigo do Editorial Titanium publicado com sucesso!"
