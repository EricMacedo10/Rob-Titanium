name: "✍️ TITANIUM: Editorial Semanal (7 dias)"

on:
  schedule:
    # Executa todo domingo às 03:00 BRT (06:00 UTC)
    - cron: '0 6 * * 0'
  workflow_dispatch:

jobs:
  generate-article:
    runs-on: ubuntu-latest
    steps:
      - name: 🛰️ Checkout Código
        uses: actions/checkout@v3

      - name: 🐍 Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: 📦 Instalar Dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: ✍️ Gerar Novo Artigo Semanal
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          PYTHONPATH: .
        run: python core/auto_blog_generator.py

      - name: 🚀 Subir para Produção (Hostinger)
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USER: ${{ secrets.FTP_USER }}
          FTP_PASS: ${{ secrets.FTP_PASS }}
          ENV_MODE: PRODUCTION
          PYTHONPATH: .
        run: python sync_production_v12.py

      - name: ✨ Blog Atualizado
        run: echo "Novo artigo do Editorial Titanium publicado com sucesso!"
