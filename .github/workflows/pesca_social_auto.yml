name: "🎣 PESCA TITANIUM: Social Auto-Post (Feed)"

# ─────────────────────────────────────────────────────────────────────────────
# ROBÔ PESCA TITANIUM — Feed/Carrossel (independente do bot de Moda)
# Posta no feed estático da conta @pescatitanium
# Horários: 07h e 18h BRT
# ─────────────────────────────────────────────────────────────────────────────

on:
  schedule:
    # 07:00 BRT = 10:00 UTC (manhã dos pescadores)
    - cron: '0 10 * * *'
    # 18:00 BRT = 21:00 UTC (fim do dia)
    - cron: '0 21 * * *'
  workflow_dispatch:

# Grupo SEPARADO → jamais cancela o workflow de moda ou de reels pesca
concurrency:
  group: pesca-social
  cancel-in-progress: true

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  PYTHONUNBUFFERED: 1

jobs:
  pesca-social-post:
    runs-on: ubuntu-latest

    steps:
      - name: "🛰️ Checkout do Código"
        uses: actions/checkout@v4

      - name: "🐍 Setup Python 3.10"
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: "🎥 Instalar FFmpeg + Fontes"
        run: sudo apt-get update && sudo apt-get install -y ffmpeg fonts-dejavu-core

      - name: "📦 Instalar dependências"
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt --retries 5 --timeout 60
          pip install pandas moviepy Pillow requests python-dotenv

      - name: "🎣 Publicar no Feed da Pesca Titanium (Reel sem Story)"
        env:
          PYTHONPATH: .
          POST_REEL: 'true'
          POST_STORY: 'false'
          # ── Secrets EXCLUSIVOS da conta Pesca Titanium ───────────────────────
          PESCA_IG_ACCESS_TOKEN: ${{ secrets.PESCA_IG_ACCESS_TOKEN }}
          PESCA_IG_BUSINESS_ID: ${{ secrets.PESCA_IG_BUSINESS_ID }}
          PESCA_PAGE_ID: ${{ secrets.PESCA_PAGE_ID }}
          PESCA_IMGBB_API_KEY: ${{ secrets.PESCA_IMGBB_API_KEY }}
          PESCA_SHOPEE_DATAFEED_URLS: ${{ secrets.PESCA_SHOPEE_DATAFEED_URLS }}
          # ── Fallback ─────────────────────────────────────────────────────────
          IMGBB_API_KEY: ${{ secrets.IMGBB_API_KEY }}
          ENV_MODE: PRODUCTION
        run: python pesca/automate_pesca.py

      - name: "📦 Arquivar Estado do Bot Pesca"
        uses: stefanzweifel/git-auto-commit-action@v4
        with:
          commit_message: "🎣 Pesca Feed Bot: Estado Atualizado"
          file_pattern: 'pesca/postados/ pesca/fila/ pesca/ofertas_pesca.json'
