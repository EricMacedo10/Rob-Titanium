name: '🦾 Titanium: Sensual Niche Auto-Update'

on:
  schedule:
    # Rodando em horários alternados para não colidir com Moda/Beleza
    # 03:15, 09:15, 15:15, 21:15 UTC
    - cron: '11 3 * * *'
    - cron: '13 9 * * *'
    - cron: '17 15 * * *'
    - cron: '19 21 * * *'
  workflow_dispatch: # Permite rodar manualmente para testes

# Permissões necessárias para salvar os resultados de volta no GitHub
permissions:
  contents: write

# Trava de Segurança Nuclear: Impede que dois updates do mesmo nicho rodem ao mesmo tempo
concurrency:
  group: niche-sensual
  cancel-in-progress: true

jobs:
  update-sensual-niche:
    runs-on: ubuntu-latest
    steps:
      - name: 'Checkout Repository'
        uses: actions/checkout@v4

      - name: 'Setup Python'
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: 'Install Dependencies'
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: '🦾 Step 1: Sensual Miner (Busca & Filtro de Luxo)'
        run: python scraper/production_sensual_miner.py
        env:
          PYTHONPATH: .

      - name: '🧠 Step 2: Sensual Radar (IA Review Generation)'
        run: python core/production_sensual_radar.py
        env:
          PYTHONPATH: .
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY_SENSUAL }}

      - name: '🛡️ Step 2.5: Nuclear Shield Gate (Audit Sensual Links)'
        run: python infra/shield.py
        env:
          PYTHONPATH: .

      - name: '🚀 Step 3: Auto-Commit Results'
        uses: stefanzweifel/git-auto-commit-action@v4
        with:
          commit_message: "🦾 [Bot] Sensual Niche: Automação Periódica (Staging Update)"
          file_pattern: 'site/data_sensual.json site/ai_reviews_sensual.json'

      - name: 🚀 Subir para Produção (Hostinger)
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USER: ${{ secrets.FTP_USER }}
          FTP_PASS: ${{ secrets.FTP_PASS }}
          ENV_MODE: PRODUCTION
          PYTHONPATH: .
        run: |
          python -c "from infra.upload_logic import upload_to_hostinger; import os; \
          upload_to_hostinger('site/data_sensual.json', os.getenv('FTP_HOST'), os.getenv('FTP_USER'), os.getenv('FTP_PASS'), 'data_sensual.json'); \
          upload_to_hostinger('site/ai_reviews_sensual.json', os.getenv('FTP_HOST'), os.getenv('FTP_USER'), os.getenv('FTP_PASS'), 'ai_reviews_sensual.json')"
