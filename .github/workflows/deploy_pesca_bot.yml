name: "🎣 Deploy: Robô Atendente da Pesca"

on:
  workflow_dispatch: # Permite rodar manualmente clicando em um botão

jobs:
  deploy_php:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Baixar código do repositório
        uses: actions/checkout@v4

      - name: 🐍 Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: 🚀 Executar Deploy Sênior
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USER: ${{ secrets.FTP_USER }}
          FTP_PASS: ${{ secrets.FTP_PASS }}
          PESCA_IG_ACCESS_TOKEN: ${{ secrets.PESCA_IG_ACCESS_TOKEN }}
          PESCA_PAGE_ID: ${{ secrets.PESCA_PAGE_ID }}
        run: |
          python infra/deploy_pesca_php.py
