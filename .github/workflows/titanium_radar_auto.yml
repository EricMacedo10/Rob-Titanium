name: "🛰️ TITANIUM: Radar de Tendências IA (4 dias)"

on:
  schedule:
    # Executa a cada 4 dias às 02:00 BRT (05:00 UTC)
    - cron: '0 5 */4 * *'
  workflow_dispatch: # Permite rodar manualmente pelo botão no GitHub

concurrency:
  group: titanium-radar
  cancel-in-progress: true

jobs:
  update-radar:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 🛰️ Checkout Código
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 📦 Instalar Dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt --retries 5 --timeout 60

      - name: 🤖 Gerar Novos Reviews (Radar)
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          SHOPEE_DATAFEED_URLS: ${{ secrets.SHOPEE_DATAFEED_URLS }}
          PYTHONPATH: .
        run: python -m core.review_engine

      - name: 🛡️ Nuclear Shield Gate (Audit Links)
        run: python infra/shield.py
        env:
          PYTHONPATH: .

      - name: 📦 Auto-Commit Radar Update
        uses: stefanzweifel/git-auto-commit-action@v4
        with:
          commit_message: "🤖 [Bot] Titanium: Atualização do Radar de Tendências (ai_reviews.json)"
          file_pattern: 'site/ai_reviews.json'

      - name: 🚀 Subir para Produção (Hostinger)
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USER: ${{ secrets.FTP_USER }}
          FTP_PASS: ${{ secrets.FTP_PASS }}
          ENV_MODE: PRODUCTION
          PYTHONPATH: .
        run: python sync_production_v12.py

      - name: ✨ Radar Atualizado
        run: echo "Radar de Tendências IA atualizado com sucesso no site!"
