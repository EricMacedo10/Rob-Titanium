name: Titanium Specialist Auto-Roleta

on:
  schedule:
    # Horário 1: 10:22 (Horário de Brasília / UTC-3 -> 13:22 UTC)
    - cron: '22 13 * * *'
    # Horário 2: 17:34 (Horário de Brasília / UTC-3 -> 20:34 UTC)
    - cron: '34 20 * * *'
  workflow_dispatch: # Permite disparo manual
  
permissions:
  contents: write

concurrency:
  group: titanium-specialist
  cancel-in-progress: true

jobs:
  run-curator:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests python-dotenv --retries 5 --timeout 60

    - name: Run Curator Engine (Roleta Premium)
      env:
        SHOPEE_APP_ID: ${{ secrets.SHOPEE_APP_ID }}
        SHOPEE_SECRET: ${{ secrets.SHOPEE_SECRET }}
        SHOPEE_DATAFEED_URLS: ${{ secrets.SHOPEE_DATAFEED_URLS }}
        PYTHONPATH: .
      run: |
        python -m core.curator_csv_to_json

    - name: 🛡️ Nuclear Shield Gate (Audit specialist.json)
      run: python infra/shield.py
      env:
        PYTHONPATH: .

    - name: 📦 Auto-Commit Database Update
      uses: stefanzweifel/git-auto-commit-action@v4
      with:
        commit_message: "🤖 [Bot] Titanium: Atualiza Coleção Especialista (Roleta Premium)"
        file_pattern: 'site/specialist.json'

    - name: 🚀 Subir para Produção (Hostinger)
      env:
        FTP_HOST: ${{ secrets.FTP_HOST }}
        FTP_USER: ${{ secrets.FTP_USER }}
        FTP_PASS: ${{ secrets.FTP_PASS }}
        ENV_MODE: PRODUCTION
        PYTHONPATH: .
      run: |
        python -c "from infra.upload_logic import upload_to_hostinger; import os; upload_to_hostinger('site/specialist.json', os.getenv('FTP_HOST'), os.getenv('FTP_USER'), os.getenv('FTP_PASS'), 'specialist.json')"
