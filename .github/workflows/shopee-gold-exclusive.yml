name: "🚀 TITANIUM: Shopee Gold Exclusive (Moda & Beleza)"

on:
  schedule:
    # 07:00 BRT
    - cron: '11 10 * * *'
    # 13:00 BRT
    - cron: '13 16 * * *'
    # 20:00 BRT
    - cron: '17 23 * * *'
  workflow_dispatch:

concurrency:
  group: shopee-gold
  cancel-in-progress: true

jobs:
  shopee-boutique-sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 🛰️ Checkout Boutique
        uses: actions/checkout@v4

      - name: 🐍 Setup Python Stack
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 📦 Install Core Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt --retries 5 --timeout 60

      - name: 👗 Executar Minerador de Elite (Shopee 100%)
        env:
          SHOPEE_APP_ID: ${{ secrets.SHOPEE_APP_ID }}
          SHOPEE_SECRET: ${{ secrets.SHOPEE_SECRET }}
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USER: ${{ secrets.FTP_USER }}
          FTP_PASS: ${{ secrets.FTP_PASS }}
          SHOPEE_DATAFEED_URLS: ${{ secrets.SHOPEE_DATAFEED_URLS }}
          ENV_MODE: PRODUCTION
          PYTHONPATH: .
        run: python -m core.orchestrator

      - name: 🛡️ Nuclear Shield Gate (Audit Links)
        run: python infra/shield.py
        env:
          PYTHONPATH: .

      - name: 📦 Auto-Commit Database Update
        uses: stefanzweifel/git-auto-commit-action@v4
        with:
          commit_message: "🤖 [Bot] Titanium: Atualização do Catálogo (data.json)"
          file_pattern: 'site/data.json'

      - name: ✨ Sincronização Concluída
        run: echo "Boutique sincronizada com sucesso. Shopee Exclusive Ativo!"
