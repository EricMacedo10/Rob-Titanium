name: "🚀 TITANIUM: Shopee Gold Exclusive (Moda & Beleza)"

on:
  schedule:
    # 07:00 BRT
    - cron: '0 10 * * *'
    # 13:00 BRT
    - cron: '0 16 * * *'
    # 20:00 BRT
    - cron: '0 23 * * *'
  workflow_dispatch:

jobs:
  shopee-boutique-sync:
    runs-on: ubuntu-latest
    steps:
      - name: 🛰️ Checkout Boutique
        uses: actions/checkout@v3

      - name: 🐍 Setup Python Stack
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: 📦 Install Core Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests python-dotenv

      - name: 👗 Executar Minerador de Elite (Shopee 100%)
        env:
          SHOPEE_APP_ID: ${{ secrets.SHOPEE_APP_ID }}
          SHOPEE_SECRET: ${{ secrets.SHOPEE_SECRET }}
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USER: ${{ secrets.FTP_USER }}
          FTP_PASS: ${{ secrets.FTP_PASS }}
          ENV_MODE: PRODUCTION
          PYTHONPATH: .
        run: python core/orchestrator.py

      - name: ✨ Sincronização Concluída
        run: echo "Boutique sincronizada com sucesso. Shopee Exclusive Ativo!"
