name: рҹ•өпёҸвҖҚвҷӮпёҸ Debug FTP Path

on:
  workflow_dispatch:

jobs:
  debug:
    runs-on: ubuntu-latest
    
    steps:
      - name: рҹ“Ҙ Checkout Code
        uses: actions/checkout@v4
      
      - name: рҹҗҚ Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: рҹ“Ұ Install Dependencies
        run: |
          pip install python-dotenv
      
      - name: рҹ•өпёҸвҖҚвҷӮпёҸ Run Pathfinder
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USER: ${{ secrets.FTP_USER }}
          FTP_PASS: ${{ secrets.FTP_PASS }}
        run: |
          python debug_ftp_path.py
